- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
    course: "Devops With Ansible"
    myIP: "246.567.890.287"
    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    tagsList: [
      {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]
  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Gopichand, {{ GREETNIG | default('Good Morning') }}"

  - name: converting string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  
  - name: converting map to list
    ansible.builtin.debug:
      msg: "{{ tagsMap | dict2items }}"

  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ tagsList | items2dict }}"

  - name: read students yaml
    ansible.builtin.set_fact: # setting the variable
      students_yaml: "{{ lookup('file', 'students.yaml' ) | from_yaml  }}"

  - name: convert YAML to JSON
    ansible.builtin.debug:
      msg: "{{ students_yaml | to_nice_json }}"

  - name: convert to upper case
    ansible.builtin.debug:
      msg: "{{ course | upper }}"

  - name: convert to lower case
    ansible.builtin.debug:
      msg: "{{ course | lower }}"

  - name: check ipv4
    ansible.builtin.debug:
      msg: "{{ myIP | ansible.utils,ipv4 }}"