- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
  tags:
    name: ansible
    project: roboshop
    component: catalogue
  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi Gopichand, {{ GREETNIG | default('Good Morning') }}"

  - name: converting string to list
    ansible.builtin.debug:
      msg: "{{ topics | split(',') }}"
  
  - name: converting map to list
    ansible.builtin.debug:
      msg: "{{ tags | dict2items }}"