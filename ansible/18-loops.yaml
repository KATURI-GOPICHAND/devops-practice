- name: Install Packages
  hosts: local
  connection: local
  become: Yes
  tasks:
  - name: Install package
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop: # list of map
    - {name: "mysql", state: "absent"} #map/dict
    - {name: "nginx", state: "present"}
    - {name: "zip", state: "present"}
